{% set name = "psmpy" %}
{% set version = "0.3.14" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/psmpy-{{ version }}.tar.gz
  sha256: 58ede4d31208f9f0684891a21d72a244cf1cf9e500f427077919c689083d0b47

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python >=3.6
    - pytest-runner
    - pip
  run:
    - python >=3.6
    - matplotlib-base
    - numpy
    - pandas
    - seaborn
    - scikit-learn
    - scipy

test:
  imports:
    - psmpy
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://pypi.org/project/psmpy/
  summary: Propensity score matching for python and graphical plots
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - dillonroach
